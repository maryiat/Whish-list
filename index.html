<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alina's Birthday Wish List</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg,
          #ff0000 0%,
          #ff7f00 16%,
          #ffff00 32%,
          #00ff00 48%,
          #0000ff 64%,
          #4b0082 82%,
          #8f00ff 100%);
      --text-color: #1e1e1e;
      --card-bg: rgba(255, 255, 255, 0.9);
      --claimed-bg: #d9d9d9;
      --button-green: #1b9e3f;
      --button-red: #d62828;
      --sheet-link: #0047ab;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text-color);
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 { margin-top: 0; text-align: center; font-size: 2rem; }

    .intro {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .sheet-link {
      text-align: center;
      margin: 0 0 1.5rem;
      font-size: 1rem;
    }

    .sheet-link a {
      color: var(--sheet-link);
      font-weight: 700;
      text-decoration: none;
    }

    .sheet-link a:hover { text-decoration: underline; }

    .wish-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.75rem;
    }

    .wish-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem;
      border-radius: 12px;
      background: #ffffff;
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    .wish-item img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid rgba(0, 0, 0, 0.08);
    }

    .wish-name { font-weight: bold; font-size: 1rem; }

    .wish-item button {
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      min-width: 180px;
    }

    .claim-btn { background: var(--button-green); }

    .cancel-btn {
      background: var(--button-red);
      display: none;
    }

    .wish-item.claimed {
      background: var(--claimed-bg);
      opacity: 0.85;
    }

    .wish-item.claimed .claim-btn { display: none; }
    .wish-item.claimed .cancel-btn { display: inline-block; }

    @media (max-width: 700px) {
      .wish-item { grid-template-columns: 70px 1fr; }
      .wish-item img { width: 70px; height: 70px; }
      .wish-item button {
        grid-column: 1 / -1;
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Alina's Birthday Wish List</h1>
    <p class="intro">This is a whish list for Alina's birthday.</p>
    <p class="sheet-link">
      Shared tracking sheet:
      <a href="https://docs.google.com/spreadsheets/d/your-sheet-id/edit#gid=0" target="_blank" rel="noopener noreferrer">
        Open the Google Sheets wish list
      </a>
    </p>
    <ul class="wish-list" id="wishList"></ul>
  </main>

  <script>
    const wishes = [
      { id: 1, name: 'Wireless Headphones', image: 'https://picsum.photos/seed/headphones/180/180' },
      { id: 2, name: 'Kindle Paperwhite', image: 'https://picsum.photos/seed/kindle/180/180' },
      { id: 3, name: 'Yoga Mat Set', image: 'https://picsum.photos/seed/yoga/180/180' },
      { id: 4, name: 'Coffee Gift Box', image: 'https://picsum.photos/seed/coffee/180/180' },
      { id: 5, name: 'Aromatherapy Diffuser', image: 'https://picsum.photos/seed/diffuser/180/180' },
      { id: 6, name: 'Sketchbook Collection', image: 'https://picsum.photos/seed/sketchbook/180/180' },
      { id: 7, name: 'Board Game Night Pack', image: 'https://picsum.photos/seed/boardgame/180/180' },
      { id: 8, name: 'Travel Backpack', image: 'https://picsum.photos/seed/backpack/180/180' },
      { id: 9, name: 'Smart Water Bottle', image: 'https://picsum.photos/seed/waterbottle/180/180' },
      { id: 10, name: 'Mini Projector', image: 'https://picsum.photos/seed/projector/180/180' },
      { id: 11, name: 'Cooking Class Voucher', image: 'https://picsum.photos/seed/cooking/180/180' },
      { id: 12, name: 'Polaroid Camera', image: 'https://picsum.photos/seed/polaroid/180/180' },
      { id: 13, name: 'Cozy Blanket', image: 'https://picsum.photos/seed/blanket/180/180' },
      { id: 14, name: 'Plant Starter Kit', image: 'https://picsum.photos/seed/plants/180/180' },
      { id: 15, name: 'Perfume Set', image: 'https://picsum.photos/seed/perfume/180/180' },
      { id: 16, name: 'Spa Day Certificate', image: 'https://picsum.photos/seed/spa/180/180' },
      { id: 17, name: 'Bluetooth Speaker', image: 'https://picsum.photos/seed/speaker/180/180' },
      { id: 18, name: 'Custom Jewelry', image: 'https://picsum.photos/seed/jewelry/180/180' },
      { id: 19, name: 'Weekend Getaway Bag', image: 'https://picsum.photos/seed/getaway/180/180' },
      { id: 20, name: 'Art Museum Tickets', image: 'https://picsum.photos/seed/museum/180/180' }
    ];

    const wishList = document.getElementById('wishList');

    const createWishItem = (wish) => {
      const li = document.createElement('li');
      li.className = 'wish-item';

      return li;
    };

    wishes.forEach((wish) => {
      wishList.appendChild(createWishItem(wish));
    });
  </script>
</body>
</html>
